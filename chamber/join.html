<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join | Paris Chamber of Commerce</title>
    <link rel="stylesheet" href="styles/small.css">
    <link rel="stylesheet" href="styles/larger.css">
</head>
<body>
    <header>
        <div class="header-content">
            <img src="images/chamber-logo.webp" alt="Paris Chamber Logo" id="logo" width="80" height="80">
            <div>
                <span class="header-title">Paris</span>
                <span class="header-subtitle">Chamber of Commerce</span>
            </div>
        </div>
        <button id="menu-toggle" aria-label="Toggle navigation">&#9776;</button>
        <nav id="primary-nav">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="discover.html">Discover</a></li>
                <li><a href="directory.html">Directory</a></li>
                <li><a href="join.html" class="active">Join</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>Join the Chamber</h1>
        <section class="card">
            <form action="thankyou.html" method="get">
                <label for="fname">First Name:</label>
                <input type="text" id="fname" name="fname" required>
                
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                
                <button type="submit">Join Now</button>
            </form>
        </section>
    </main>

    <footer>
        <p>WDD231 Class Project | Samar Abbas</p>
    </footer>
</body>
</html>
